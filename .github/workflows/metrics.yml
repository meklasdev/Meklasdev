name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Raz dziennie
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # BĘDZIESZ POTRZEBOWAŁ TOKENA (patrz niżej)
          user: meklasdev
          template: classic
          base: header, repositories, metadata
          config_timezone: Europe/Warsaw
          
          # Sekcja języków w ładnym stylu
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          
          # Dodatkowe bajery (izometryczny widok kontrybucji)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Stylizacja pod Twój profil
          config_order: base.header, isocalendar, languages
          output_action: commit
          committer_branch: output # To samo co u wężyka
          filename: github-metrics.svg
