name: Metrics
on:
  schedule: [{cron: "0 2 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: meklasdev
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Warsaw
          config_padding: 6%, 10%

          # ── Języki ────────────────────────────────────────────────
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8

          # ── Habits / aktywność ────────────────────────────────────
          plugin_habits: yes
          plugin_habits_from: 100        # było 200 - crashowało przy małej aktywności
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: no       # było yes - powodowało Unexpected error

          # ── Izometryczny kalendarz ────────────────────────────────
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ── Osiągnięcia ───────────────────────────────────────────
          plugin_achievements: yes
          plugin_achievements_threshold: C  # było B - obniżone żeby coś pokazać
          plugin_achievements_secrets: no   # było yes - crashowało gdy brak ukrytych
          plugin_achievements_display: compact  # było detailed - stabilniejsze

          # ── Obserwujący / Stars ───────────────────────────────────
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28
          plugin_people_size: 28
          plugin_people_identicons: yes

          plugin_stars: yes
          plugin_stars_limit: 4

          # ── Traffic ───────────────────────────────────────────────
          plugin_traffic: yes

          # ── Kolejność sekcji ──────────────────────────────────────
          config_order: >
            base.header,
            isocalendar,
            languages,
            habits,
            achievements,
            people,
            stars,
            traffic

          output_action: commit
          committer_branch: output
          filename: github-metrics.svg