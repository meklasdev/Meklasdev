name: Metrics
on:
  schedule: [{cron: "0 2 * * *"}] # 2:00 w nocy (mniejszy ruch na serwerach)
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: meklasdev
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Warsaw
          config_padding: 6%, 10%  # Lepsze odstępy, nie ucina elementów

          # ── Języki ────────────────────────────────────────────────
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used  # Dodano recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8  # Max 8 języków żeby nie zaśmiecać

          # ── Streak / aktywność ────────────────────────────────────
          plugin_habits: yes
          plugin_habits_from: 200        # Analizuj ostatnie 200 zdarzeń
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # ── Izometryczny kalendarz ────────────────────────────────
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year  # Zmieniono na cały rok

          # ── Osiągnięcia ───────────────────────────────────────────
          plugin_achievements: yes
          plugin_achievements_threshold: B   # Pokaż od poziomu B wzwyż
          plugin_achievements_secrets: yes   # Ukryte osiągnięcia też
          plugin_achievements_display: detailed

          # ── Obserwujący / Stars ───────────────────────────────────
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28
          plugin_people_size: 28
          plugin_people_identicons: yes  # Avatary zamiast pustych kółek

          plugin_stars: yes
          plugin_stars_limit: 4  # Top 4 ostatnio dodane do gwiazdek

          # ── Aktywność na repo (traffic) ───────────────────────────
          # UWAGA: wymaga tokena z uprawnieniem repo (nie tylko public_repo)
          plugin_traffic: yes

          # ── Kolejność sekcji ──────────────────────────────────────
          config_order: >
            base.header,
            isocalendar,
            languages,
            habits,
            achievements,
            people,
            stars,
            traffic

          output_action: commit
          committer_branch: output
          filename: github-metrics.svg